 

services:
  # WA-Gateway Service - Go + Meta Cloud API
  wa-gateway:
    build:
      context: ./go-services/wa-gateway
      dockerfile: Dockerfile
    container_name: tinkubot-wa-gateway
    ports:
      - "${WA_GATEWAY_PORT:-7000}:${WA_GATEWAY_PORT:-7000}"
    dns:
      - 127.0.0.11
      - 8.8.8.8
    dns_search: .
    environment:
      - TZ=America/Guayaquil
      - GATEWAY_PORT=${WA_GATEWAY_PORT:-7000}
      - RATE_LIMIT_MAX_PER_HOUR=${WA_RATE_LIMIT_MAX_PER_HOUR:-20}
      - RATE_LIMIT_MAX_PER_24H=${WA_RATE_LIMIT_MAX_PER24H:-100}
      # Webhook Configuration (Dynamic Routing)
      - AI_CLIENTES_URL=${AI_CLIENTES_URL:-http://ai-clientes:8001}
      - AI_PROVEEDORES_URL=${AI_PROVEEDORES_URL:-http://ai-proveedores:8002}
      - ONBOARDING_RUST_URL=${ONBOARDING_RUST_URL:-http://onboarding:8003}
      - RUST_ONBOARDING_TEST_NUMBERS=${RUST_ONBOARDING_TEST_NUMBERS:-+593959091325}
      - AI_PROVEEDORES_INTERNAL_TOKEN=${AI_PROVEEDORES_INTERNAL_TOKEN}
      - WEBHOOK_ENDPOINT=${WEBHOOK_ENDPOINT:-/handle-whatsapp-message}
      - WEBHOOK_TIMEOUT_MS=${WEBHOOK_TIMEOUT_MS:-10000}
      - WEBHOOK_RETRY_ATTEMPTS=${WEBHOOK_RETRY_ATTEMPTS:-3}
      - WA_META_WEBHOOK_ENABLED=${WA_META_WEBHOOK_ENABLED:-false}
      - WA_META_LOG_RAW_INBOUND=${WA_META_LOG_RAW_INBOUND:-false}
      - WA_META_LOG_RAW_INBOUND_MAX_BYTES=${WA_META_LOG_RAW_INBOUND_MAX_BYTES:-4096}
      - WA_META_ENABLED_ACCOUNTS=${WA_META_ENABLED_ACCOUNTS:-}
      - META_WEBHOOK_VERIFY_TOKEN=${META_WEBHOOK_VERIFY_TOKEN:-}
      - META_APP_SECRET=${META_APP_SECRET:-}
      - META_PHONE_NUMBER_ID_CLIENTES=${META_PHONE_NUMBER_ID_CLIENTES:-}
      - META_PHONE_NUMBER_ID_PROVEEDORES=${META_PHONE_NUMBER_ID_PROVEEDORES:-}
      - WA_META_OUTBOUND_ENABLED=${WA_META_OUTBOUND_ENABLED:-false}
      - WA_META_PRESERVE_JID_FOR_LID=${WA_META_PRESERVE_JID_FOR_LID:-false}
      - META_GRAPH_BASE_URL=${META_GRAPH_BASE_URL:-https://graph.facebook.com}
      - META_GRAPH_API_VERSION=${META_GRAPH_API_VERSION:-v25.0}
      - META_WABA_ID_CLIENTES=${META_WABA_ID_CLIENTES:-}
      - META_WABA_ID_PROVEEDORES=${META_WABA_ID_PROVEEDORES:-}
      - META_CLIENTES_ACCESS_TOKEN=${META_CLIENTES_ACCESS_TOKEN:-}
      - META_PROVEEDORES_ACCESS_TOKEN=${META_PROVEEDORES_ACCESS_TOKEN:-}
    networks:
      - wa-gateway-ipv4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/wa-gateway", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Frontend Service - Interfaz web para el usuario
  frontend:
    build:
      context: ./nodejs-services/frontend
      dockerfile: Dockerfile
    container_name: tinkubot-frontend
    ports:
      - "${FRONTEND_SERVICE_PORT:-5000}:${FRONTEND_SERVICE_PORT:-5000}"
    environment:
      - TZ=America/Guayaquil
      - FRONTEND_SERVICE_PORT=${FRONTEND_SERVICE_PORT}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_PROVIDERS_TABLE=${SUPABASE_PROVIDERS_TABLE:-providers}
      - PROVIDERS_PENDING_LIMIT=${PROVIDERS_PENDING_LIMIT:-100}
      - AI_PROVEEDORES_URL=${AI_PROVEEDORES_URL:-http://ai-proveedores:8002}
      - AI_PROVEEDORES_INTERNAL_TOKEN=${AI_PROVEEDORES_INTERNAL_TOKEN}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - NODE_ENV=production
    networks:
      - wa-gateway-ipv4
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    build: ./infrastructure-services/message-queue
    container_name: tinkubot-redis
    ports:
      - "6379:6379"
    environment:
      - TZ=America/Guayaquil
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - wa-gateway-ipv4
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # AI Service Clientes - Procesamiento con sesiones integradas
  ai-clientes:
    build:
      context: ./python-services
      dockerfile: ai-clientes/Dockerfile
    container_name: tinkubot-ai-clientes
    ports:
      - "${CLIENTES_SERVER_PORT:-8001}:${CLIENTES_SERVER_PORT:-8001}"
    environment:
      - TZ=America/Guayaquil
      - WHATSAPP_CLIENTES_URL=http://wa-gateway:7000
      - WHATSAPP_CLIENTES_ACCOUNT_ID=bot-clientes
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      - REDIS_URL=${REDIS_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - AI_SEARCH_INTERNAL_TOKEN=${AI_SEARCH_INTERNAL_TOKEN}
      - FEEDBACK_DELAY_SECONDS=${FEEDBACK_DELAY_SECONDS:-7200}
      - TASK_POLL_INTERVAL_SECONDS=${TASK_POLL_INTERVAL_SECONDS:-60}
      - AVAILABILITY_TIMEOUT_SECONDS=${AVAILABILITY_TIMEOUT_SECONDS:-180}
      - AVAILABILITY_TTL_SECONDS=${AVAILABILITY_TTL_SECONDS:-300}
      - AVAILABILITY_PROVIDER_LOCK_TTL_SECONDS=${AVAILABILITY_PROVIDER_LOCK_TTL_SECONDS:-193}
      - FREE_LEADS_DEFAULT=${FREE_LEADS_DEFAULT:-5}
      - LEAD_DEDUPE_WINDOW_DAYS=${LEAD_DEDUPE_WINDOW_DAYS:-7}
      - SEARCH_POOL_TIMEOUT_SECONDS=${SEARCH_POOL_TIMEOUT_SECONDS:-2}
      - SEARCH_MAX_INFLIGHT=${SEARCH_MAX_INFLIGHT:-60}
      - SEARCH_MAX_QUEUE=${SEARCH_MAX_QUEUE:-80}
      - SEARCH_CB_FAILURE_THRESHOLD=${SEARCH_CB_FAILURE_THRESHOLD:-5}
      - SEARCH_CB_OPEN_SECONDS=${SEARCH_CB_OPEN_SECONDS:-20}
      - SEARCH_CB_HALF_OPEN_SUCCESS_THRESHOLD=${SEARCH_CB_HALF_OPEN_SUCCESS_THRESHOLD:-2}
      - FLOW_TTL_SECONDS=${FLOW_TTL_SECONDS:-86400}
      - VALIDACION_PROVEEDORES_IA_ONLY=${VALIDACION_PROVEEDORES_IA_ONLY:-false}
      - WA_ONBOARDING_STRATEGY=${WA_ONBOARDING_STRATEGY:-session_first_v1}
      - WA_ONBOARDING_IMAGE_URL=${WA_ONBOARDING_IMAGE_URL:-}
      - WA_ONBOARDING_IMAGE_CAPTION=${WA_ONBOARDING_IMAGE_CAPTION:-TinkuBot}
      - WA_ONBOARDING_CONTINUE_LABEL=${WA_ONBOARDING_CONTINUE_LABEL:-Continuar}
      - WA_ONBOARDING_CONTINUE_ID=${WA_ONBOARDING_CONTINUE_ID:-continue_onboarding}
      - WA_ONBOARDING_FOOTER_TEXT=${WA_ONBOARDING_FOOTER_TEXT:-Al continuar aceptas nuestras condiciones.}
      - CLIENTES_SERVER_PORT=${CLIENTES_SERVER_PORT}
      - AI_SERVICE_CLIENTES_PORT=${AI_SERVICE_CLIENTES_PORT}
      - SERVER_HOST=${SERVER_HOST}
      - UVICORN_WORKERS=${AI_CLIENTES_UVICORN_WORKERS:-2}
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - wa-gateway-ipv4
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # AI Service Proveedores - Procesamiento con sesiones integradas
  ai-proveedores:
    build:
      context: ./python-services
      dockerfile: ai-proveedores/Dockerfile
    container_name: tinkubot-ai-proveedores
    ports:
      - "${PROVEEDORES_SERVER_PORT:-8002}:${PROVEEDORES_SERVER_PORT:-8002}"
    environment:
      - TZ=America/Guayaquil
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      - REDIS_URL=${REDIS_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_PROVIDERS_BUCKET=${SUPABASE_PROVIDERS_BUCKET:-tinkubot-providers}
      - PROVIDER_MAX_SERVICES=${PROVIDER_MAX_SERVICES:-10}
      - PROVIDER_SERVICES_DISPLAY_ORDER_MAX=${PROVIDER_SERVICES_DISPLAY_ORDER_MAX:-6}
      - WHATSAPP_PROVEEDORES_URL=${WHATSAPP_PROVEEDORES_URL:-http://wa-gateway:7000}
      - WHATSAPP_PROVEEDORES_ACCOUNT_ID=${WHATSAPP_PROVEEDORES_ACCOUNT_ID:-bot-proveedores}
      - WA_PROVIDER_ONBOARDING_BTN_REGISTRARSE_HEADER_URL=${WA_PROVIDER_ONBOARDING_BTN_REGISTRARSE_HEADER_URL:-}
      - WA_PROVIDER_ONBOARDING_DNI_FRONT_GUIDE_URL=${WA_PROVIDER_ONBOARDING_DNI_FRONT_GUIDE_URL:-}
      - WA_PROVIDER_ONBOARDING_PROFILE_PHOTO_GUIDE_URL=${WA_PROVIDER_ONBOARDING_PROFILE_PHOTO_GUIDE_URL:-}
      - PROVIDER_ONBOARDING_CONSENT_IMAGE_URL=${PROVIDER_ONBOARDING_CONSENT_IMAGE_URL:-https://euescxureboitxqjduym.supabase.co/storage/v1/object/sign/tinkubot-assets/images/tinkubot_providers_onboarding.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV8wMTQwMDNkYS1hOWY0LTQ1YmYtOTE1Zi1hZmYzZTExNDhhODciLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJ0aW5rdWJvdC1hc3NldHMvaW1hZ2VzL3Rpbmt1Ym90X3Byb3ZpZGVyc19vbmJvYXJkaW5nLnBuZyIsImlhdCI6MTc3Mjk1MDYyMiwiZXhwIjoxODM2MDIyNjIyfQ.J3a8O9wRoUo8PDwpcdv3KD5kPpfvKIONoIqXjsWORdI}
      - WA_PROVIDER_SOCIAL_NETWORK_IMAGE_URL=${WA_PROVIDER_SOCIAL_NETWORK_IMAGE_URL:-}
      - WA_PROVIDER_SERVICES_IMAGE_URL=${WA_PROVIDER_SERVICES_IMAGE_URL:-}
      - WA_ONBOARDING_TEMPLATE_HEADER_IMAGE_URL=${WA_ONBOARDING_TEMPLATE_HEADER_IMAGE_URL:-}
      - WA_ONBOARDING_IMAGE_URL=${WA_ONBOARDING_IMAGE_URL:-}
      - PROVIDER_ONBOARDING_CLEANUP_INTERVAL_SECONDS=${PROVIDER_ONBOARDING_CLEANUP_INTERVAL_SECONDS:-900}
      - PROVIDER_ONBOARDING_WARNING_HOURS=${PROVIDER_ONBOARDING_WARNING_HOURS:-48}
      - PROVIDER_ONBOARDING_EXPIRY_HOURS=${PROVIDER_ONBOARDING_EXPIRY_HOURS:-72}
      - PROVIDER_ONBOARDING_ASYNC_PERSISTENCE_ENABLED=${PROVIDER_ONBOARDING_ASYNC_PERSISTENCE_ENABLED:-true}
      - PROVIDER_ONBOARDING_STREAM_KEY=${PROVIDER_ONBOARDING_STREAM_KEY:-provider_onboarding_events}
      - PROVIDER_ONBOARDING_STREAM_GROUP=${PROVIDER_ONBOARDING_STREAM_GROUP:-provider-onboarding-workers}
      - PROVIDER_ONBOARDING_STREAM_MAXLEN=${PROVIDER_ONBOARDING_STREAM_MAXLEN:-10000}
      - PROVEEDORES_SERVER_PORT=${PROVEEDORES_SERVER_PORT}
      - AI_SERVICE_PROVEEDORES_PORT=${AI_SERVICE_PROVEEDORES_PORT}
      - AI_PROVEEDORES_INTERNAL_TOKEN=${AI_PROVEEDORES_INTERNAL_TOKEN}
      - SERVER_HOST=${SERVER_HOST}
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - wa-gateway-ipv4
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  onboarding:
    build:
      context: ./rust-services/onboarding
      dockerfile: Dockerfile
    container_name: tinkubot-onboarding
    ports:
      - "${ONBOARDING_PORT:-8003}:8003"
    environment:
      - REDIS_URL=${REDIS_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_PROVIDERS_BUCKET=${SUPABASE_PROVIDERS_BUCKET:-tinkubot-providers}
      - AI_PROVEEDORES_INTERNAL_TOKEN=${AI_PROVEEDORES_INTERNAL_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - RUST_ONBOARDING_TEST_NUMBERS=${RUST_ONBOARDING_TEST_NUMBERS:-}
      - PORT=${ONBOARDING_PORT:-8003}
      - RUST_LOG=${RUST_LOG:-info}
      - WA_PROVIDER_ONBOARDING_CONSENT_URL=${WA_PROVIDER_ONBOARDING_CONSENT_URL:-}
      - PROVIDER_ONBOARDING_STREAM_KEY=${PROVIDER_ONBOARDING_STREAM_KEY:-provider_onboarding_events}
      - PROVIDER_ONBOARDING_STREAM_MAXLEN=${PROVIDER_ONBOARDING_STREAM_MAXLEN:-10000}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - wa-gateway-ipv4
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  provider-onboarding-worker:
    build:
      context: ./elixir-services/provider-onboarding-worker
      dockerfile: Dockerfile
    container_name: tinkubot-provider-onboarding-worker
    environment:
      - REDIS_URL=${REDIS_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - AI_PROVEEDORES_URL=${AI_PROVEEDORES_URL:-http://ai-proveedores:8002}
      - AI_PROVEEDORES_INTERNAL_TOKEN=${AI_PROVEEDORES_INTERNAL_TOKEN}
      - SUPABASE_PROVIDERS_BUCKET=${SUPABASE_PROVIDERS_BUCKET:-tinkubot-providers}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PROVIDER_ONBOARDING_STREAM_KEY=${PROVIDER_ONBOARDING_STREAM_KEY:-provider_onboarding_events}
      - PROVIDER_ONBOARDING_STREAM_GROUP=${PROVIDER_ONBOARDING_STREAM_GROUP:-provider-onboarding-workers}
      - PROVIDER_ONBOARDING_DLQ_STREAM_KEY=${PROVIDER_ONBOARDING_DLQ_STREAM_KEY:-provider_onboarding_events_dlq}
      - PROVIDER_ONBOARDING_CONSUMER_NAME=${PROVIDER_ONBOARDING_CONSUMER_NAME:-provider-onboarding-worker-1}
      - PROVIDER_ONBOARDING_STREAM_BLOCK_MS=${PROVIDER_ONBOARDING_STREAM_BLOCK_MS:-5000}
      - PROVIDER_ONBOARDING_STREAM_BATCH_SIZE=${PROVIDER_ONBOARDING_STREAM_BATCH_SIZE:-10}
      - PROVIDER_ONBOARDING_STREAM_CLAIM_IDLE_MS=${PROVIDER_ONBOARDING_STREAM_CLAIM_IDLE_MS:-30000}
      - PROVIDER_ONBOARDING_STREAM_MAX_ATTEMPTS=${PROVIDER_ONBOARDING_STREAM_MAX_ATTEMPTS:-5}
      - PROVIDER_ONBOARDING_STATUS_TTL_SECONDS=${PROVIDER_ONBOARDING_STATUS_TTL_SECONDS:-172800}
      - PROVIDER_OPENAI_EMBEDDING_MODEL=${PROVIDER_OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
    depends_on:
      redis:
        condition: service_healthy
      ai-proveedores:
        condition: service_healthy
    networks:
      - wa-gateway-ipv4
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Provider Prefetch Worker - Pre-fetches search results during client confirmation
  provider-prefetch-worker:
    build:
      context: ./elixir-services/provider-prefetch-worker
      dockerfile: Dockerfile
    container_name: tinkubot-provider-prefetch-worker
    environment:
      - REDIS_URL=${REDIS_URL}
      - AI_SEARCH_URL=${AI_SEARCH_URL:-http://ai-search:8000}
      - AI_SEARCH_INTERNAL_TOKEN=${AI_SEARCH_INTERNAL_TOKEN}
      - PROVIDER_PREFETCH_STREAM_KEY=${PROVIDER_PREFETCH_STREAM_KEY:-client_search_prefetch_events}
      - PROVIDER_PREFETCH_STREAM_GROUP=${PROVIDER_PREFETCH_STREAM_GROUP:-provider-prefetch-workers}
      - PROVIDER_PREFETCH_CONSUMER_NAME=${PROVIDER_PREFETCH_CONSUMER_NAME:-provider-prefetch-worker-1}
      - PROVIDER_PREFETCH_STREAM_BLOCK_MS=${PROVIDER_PREFETCH_STREAM_BLOCK_MS:-5000}
      - PROVIDER_PREFETCH_STREAM_BATCH_SIZE=${PROVIDER_PREFETCH_STREAM_BATCH_SIZE:-10}
      - PROVIDER_PREFETCH_STREAM_CLAIM_IDLE_MS=${PROVIDER_PREFETCH_STREAM_CLAIM_IDLE_MS:-15000}
      - PROVIDER_PREFETCH_MAX_ATTEMPTS=${PROVIDER_PREFETCH_MAX_ATTEMPTS:-2}
      - PROVIDER_PREFETCH_STATUS_TTL_SECONDS=${PROVIDER_PREFETCH_STATUS_TTL_SECONDS:-300}
      - PROVIDER_PREFETCH_RESULT_TTL_SECONDS=${PROVIDER_PREFETCH_RESULT_TTL_SECONDS:-120}
      - PROVIDER_PREFETCH_SEARCH_TIMEOUT_MS=${PROVIDER_PREFETCH_SEARCH_TIMEOUT_MS:-8000}
    depends_on:
      redis:
        condition: service_healthy
      ai-search:
        condition: service_started
    networks:
      - wa-gateway-ipv4
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # AI Search Service - Servicio de búsqueda optimizado con IA
  ai-search:
    build:
      context: ./python-services
      dockerfile: ai-search/Dockerfile
    container_name: tinkubot-ai-search
    ports:
      - "${AI_SEARCH_PORT:-8000}:${AI_SEARCH_PORT:-8000}"
    environment:
      - TZ=America/Guayaquil
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_SEARCH_INTERNAL_TOKEN=${AI_SEARCH_INTERNAL_TOKEN}
      - AI_SEARCH_PORT=${AI_SEARCH_PORT}
      - EMBEDDINGS_TIMEOUT_SECONDS=${EMBEDDINGS_TIMEOUT_SECONDS:-20}
      - EMBEDDINGS_RETRY_ATTEMPTS=${EMBEDDINGS_RETRY_ATTEMPTS:-1}
      - EMBEDDINGS_RETRY_BACKOFF_MS=${EMBEDDINGS_RETRY_BACKOFF_MS:-300}
      - VECTOR_SIMILARITY_THRESHOLD=${VECTOR_SIMILARITY_THRESHOLD:-0.60}
      - SEMANTIC_ALIGNMENT_THRESHOLD=${SEMANTIC_ALIGNMENT_THRESHOLD:-0.50}
      - UVICORN_WORKERS=${AI_SEARCH_UVICORN_WORKERS:-2}
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - wa-gateway-ipv4
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s


networks:
  wa-gateway-ipv4:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

volumes:
  redis-data:
    driver: local
